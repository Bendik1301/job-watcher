name: FINN job watcher

on:
  workflow_dispatch:
  schedule:
    - cron: "15 7 * * *"
      timezone: "Europe/Oslo"

permissions:
  contents: write

jobs:
  scan:
    runs-on: [self-hosted, macOS]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run FINN scanner
        run: python scripts/finn_job_scan.py

      - name: Add result to workflow summary
        run: cat output/latest_matches.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit updated state and output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen_jobs.json output/latest_matches.md output/latest_matches.json

          if git diff --cached --quiet; then
            echo "Ingen endringer å committe."
          else
            git commit -m "Update FINN job matches"
            git push
          fi
